ext x?html?, has firefox,          X, flag f = firefox -- "$@"

mime ^text,  label editor = micro -- "$@"
mime ^text,  label editor = subl_orig -- "$@"
#mime ^text,  label pager  = "$PAGER" -- "$@"
!mime ^text, label editor, ext conf|opf|md|xml|json|csv|tex|py|pl|rb|js|jsx|tsx|sh|php|glsl|hlsl|cfg|lua|rs|toml|go|c|cpp|h|hpp|cc|hh|yaml = micro -- "$@"
!mime ^text, label editor, ext xml|json|csv|tex|py|pl|rb|js|sh|php = subl_orig -- "$@"

ext 1                         = man "$1"
name ^[mM]akefile$            = make

#ext py  = python3 -- "$1"
#ext pl  = perl -- "$1"
#ext rb  = ruby -- "$1"
#ext js  = node -- "$1"
#ext sh  = micro -- "$@"
ext sh  = sh -- "$1"
#ext php = php -- "$1"

mime ^audio = umpv -- "$@"
mime ^audio = ffplay40 "$@"
mime ^audio = ffplay50 "$@"
mime ^audio = ffplay60 "$@"

# DO NOT USE THIS, IT CAUSES DJVUs TO OPEN IN UMPV
# mime ^image = umpv -- "$@"

ext jpg|jpeg|webm|png|gif|bmp|webp = umpv -- "$@"
ext webm|mkv|mp4|avi|flv|mpg|m2ts|wmv = umpv -- "$@"

ext m4a|mp4  = for file in "$@"; do ffmpeg -loglevel warning -i "${file}" -vn -acodec copy "${file%.*}.aac";  done
ext webm = for file in "$@"; do ffmpeg -loglevel warning -i "${file}" -vn -acodec copy "${file%.*}.opus"; done
ext m4a|aac  = for file in "$@"; do ffmpeg -loglevel warning -i "${file}" -vn -acodec flac "${file%.*}.flac"; done

ext png = for file in "$@"; do magick convert "${file}" "${file%.*}.jpeg"; done
ext png = for file in "$@"; do magick convert -quality 20 "${file}" "${file%.*}.jpeg"; done

mime ^video, terminal, !X, has mpv       = mpv "$@"

ext pdf, has zathura,  X, flag f = zathura -- "$@"
ext pdf = for file in "$@"; do pdftohtml -noframes -i "${file}" "${file%.*}.html"; done
ext pdf = for file in "$@"; do pdftohtml -noframes -i -hidden -s "${file}" "${file%.*}.html"; done
ext djvu, has zathura,X, flag f = zathura -- "$@"
ext docx?, has catdoc,       terminal = catdoc -- "$@" | "$PAGER"

ext                        sxc|xlsx?|xlt|xlw|gnm|gnumeric, has gnumeric,    X, flag f = gnumeric -- "$@"
ext                        sxc|xlsx?|xlt|xlw|gnm|gnumeric, has kspread,     X, flag f = kspread -- "$@"
ext pptx?|od[dfgpst]|docx?|sxc|xlsx?|xlt|xlw|gnm|gnumeric, has libreoffice, X, flag f = libreoffice "$@"
ext pptx?|od[dfgpst]|docx?|sxc|xlsx?|xlt|xlw|gnm|gnumeric, has soffice,     X, flag f = soffice "$@"
ext pptx?|od[dfgpst]|docx?|sxc|xlsx?|xlt|xlw|gnm|gnumeric, has ooffice,     X, flag f = ooffice "$@"

ext cbr,  has zathura,      X, flag f = zathura -- "$@"
ext cbz,  has zathura,      X, flag f = zathura -- "$@"

ext 7z, has 7z = 7z -p l "$@" | "$PAGER"
ext xpi = 7z x "$@"

# Listing and extracting archives without atool:
ext tar|gz|bz2|xz, has tar = tar vvtf "$1" | "$PAGER"
ext tar|gz|bz2|xz, has tar = for file in "$@"; do tar vvxf "$file"; done
ext tar.gz, has tar = for file in "$@"; do tar -xzvf "$file"; done
ext bz2, has bzip2 = for file in "$@"; do bzip2 -dk "$file"; done
ext zip, has unzip = unzip -l "$1" | "$PAGER"
ext zip, has unzip = for file in "$@"; do unzip -d "${file%.*}" "$file"; done
ext zip, has unzip = for file in "$@"; do unzip "$file"; done
ext htmlz, has unzip = for file in "$@"; do unzip -d "${file%.*}" "$file"; done
ext ace, has unace = unace l "$1" | "$PAGER"
ext ace, has unace = for file in "$@"; do unace e "$file"; done
ext rar, has unrar = unrar l "$1" | "$PAGER"
# ext rar, has unrar = for file in "$@"; do unrar x "${file%.*}"; done
ext rar, has unrar = for file in "$@"; do unrar x "$file" "${file%.*}/"; done
# ext rar, has unrar = for file in "$@"; do unrar x "$file" "/mnt/ramdisk/${file%.*}/"; done
ext chm|lit|azw|azw3|mobi|djvu|pdf|lrf = for file in "$@"; do ebook-convert "${file}" "${file%.*}.htmlz"; done
ext jpg|jpeg = for file in "$@"; do exiftool -all= -overwrite_original "${file}"; done
ext sqlite = for file in "$@"; do sqlite3 "${file}" vacuum; done
ext sqlite = for file in "$@"; do sqlite3 "${file}" reindex; done

# ext zip|7z|rar, has 7z = for file in "$@"; do extractArchiveToRamdisk.sh "$file"; done
# ext zip|7z|rar, has 7z = for file in "$@"; do extractArchiveToRamdiskNoSubdirs.sh "$file"; done

ext epub = for file in "$@"; do /home/main/.local/bin/epub2html "$file"; done
ext epub = for file in "$@"; do ebook-convert "${file}" "${file%.*}.htmlz"; done
ext html = for file in "$@"; do w3m -dump "$file" > "${file%.*}.txt"; done
ext html = for file in "$@"; do tidy "$file"; done

ext otf = gnome-font-viewer

